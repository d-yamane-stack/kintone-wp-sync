<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KINTONE Sync Web</title>
    <style>
      body { font-family: sans-serif; margin: 24px; }
      h1 { margin-bottom: 8px; }
      .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
      input, button { padding: 8px; font-size: 14px; }
      #jobs li { margin-bottom: 8px; }
      #logs { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 6px; max-height: 320px; overflow: auto; }
      .muted { color: #666; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>KINTONE → WordPress 実行Web</h1>
    <p class="muted">実行開始 / 進捗表示 / 結果確認</p>

    <div class="row">
      <label>件数: <input id="limit" type="number" min="1" max="100" value="3" /></label>
      <span>または</span>
      <label>レコードID: <input id="recordId" type="text" placeholder="1234" /></label>
      <button id="runBtn">実行開始</button>
    </div>

    <h2>ジョブ一覧</h2>
    <ul id="jobs"></ul>

    <h2>ジョブログ</h2>
    <div id="logs">ジョブを選択してください。</div>

    <script src="/app.js"></script>
  </body>
</html>
